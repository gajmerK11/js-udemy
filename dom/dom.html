<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
  </head>
  <body>
    <h1>JS DOM fun examples</h1>

    <!-- Acessing DOM Elements -->
    <section>
      <h2>Accessing DOM Elements</h2>
      <p id="myParagraph">
        This is a paragraph. Click the button to change me!
      </p>
      <button id="changeTextButton">Change Text</button>
    </section>

    <!-- Traversing the DOM -->
    <section id="example-2">
      <h2>Traversing the DOM</h2>
      <ul id="citiesList">
        <li>New York</li>
        <li>Tokyo</li>
        <li>Paris</li>
        <li>London</li>
      </ul>
      <button id="highlightFirstCity">Highlight City</button>
    </section>

    <!-- Manipulating DOM Elements -->
    <section id="example-3">
      <h2>Manipulating DOM Elements</h2>
      <div id="coffeeOrder">Order: <span id="coffeeType">Latte</span></div>
      <button id="changeOrder">Change Order to Espresso</button>
    </section>
    <script src="./dom.js"></script>
  </body>
</html>
